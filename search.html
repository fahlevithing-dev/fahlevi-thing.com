    <!-- Internal Script for Search Logic -->
    <script>
        document.addEventListener(‘DOMContentLoaded’, () => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get(‘q’);
            const displayElement = document.getElementById(‘search-query-display’);
            const container = document.getElementById(‘search-results-container’);
            const noResults = document.getElementById(‘no-results’);

            if (!query) {
                displayElement.textContent = "Please enter a search term.";
                noResults.style.display = ‘block’;
                return;
            }

            displayElement.textContent = `Showing results for: "${query}"`;

            const posts = window.allPosts || [];
            const lowerQuery = query.toLowerCase();

            const results = posts.filter(item =>
                item.title.toLowerCase().includes(lowerQuery) ||
                item.excerpt.toLowerCase().includes(lowerQuery) ||
                item.category.toLowerCase().includes(lowerQuery) ||
                item.url.toLowerCase().includes(lowerQuery)
            );

            if (results.length > 0) {
                results.forEach(item => {
                    const thumbHTML = item.image
                        ? `<div class="post-thumb"><img src="${item.image}" alt="${item.title}"></div>`
                        : ‘’;
                    container.insertAdjacentHTML(‘beforeend’, `
                        <article class="post-item">
                            ${thumbHTML}
                            <div class="post-details">
                                <div class="meta-cat">${item.category}${item.date ? ‘ • ‘ + item.date : ‘’}</div>
                                <h2><a href="/${item.url}">${item.title}</a></h2>
                                <div class="excerpt"><p>${item.excerpt}</p></div>
                                <a href="/${item.url}" class="read-more">Read More</a>
                            </div>
                        </article>
                    `);
                });
            } else {
                noResults.style.display = ‘block’;
            }
        });
    </script>
